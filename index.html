<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Majors Interactive Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { margin: 0 0 10px 0; color: #333; }
        .subtitle { color: #666; margin-bottom: 20px; }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; }
        select, button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            transition: background 0.2s;
        }
        button:hover { background: #0052a3; }
        .tooltip {
            position: absolute;
            padding: 12px;
            background: rgba(0,0,0,0.9);
            color: white;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            font-size: 13px;
            line-height: 1.5;
            max-width: 250px;
        }
        .bar { transition: opacity 0.2s; cursor: pointer; }
        .bar:hover { opacity: 0.75; }
        .axis text { font-size: 11px; }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .stat-item { flex: 1; }
        .stat-value { font-size: 24px; font-weight: 700; color: #0066cc; }
        .stat-label { font-size: 12px; color: #666; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>College Majors: Salary, Employment & Gender</h1>
    <p class="subtitle">Explore outcomes for recent graduates — filter by category, sort by different metrics, and hover for details</p>

    <div class="controls">
        <div class="control-group">
            <label>Major Category</label>
            <select id="categoryFilter">
                <option value="all">All Categories</option>
            </select>
        </div>
        <div class="control-group">
            <label>Sort By</label>
            <button id="sortBtn">Median Salary</button>
        </div>
    </div>

    <svg id="chart"></svg>

    <!-- Summary stats update reactively when filters change -->
    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="statCount">-</div>
            <div class="stat-label">Majors Shown</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statMedian">-</div>
            <div class="stat-label">Avg Median Salary</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statUnemployment">-</div>
            <div class="stat-label">Avg Unemployment</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statWomen">-</div>
            <div class="stat-label">Avg % Women</div>
        </div>
    </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
    const margin = {top: 20, right: 140, bottom: 60, left: 200};
    const width  = 1140 - margin.left - margin.right;
    const height = 600  - margin.top  - margin.bottom;

    const svg = d3.select("#chart")
        .attr("width",  width  + margin.left + margin.right)
        .attr("height", height + margin.top  + margin.bottom)
        .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

    const tooltip = d3.select("#tooltip");

    // Human-readable labels and tick formatters for each sortable metric
    const metricConfig = {
        Median:            { label: "Median Salary",     format: d => "$" + d / 1000 + "k" },
        Unemployment_rate: { label: "Unemployment Rate", format: d => (d * 100).toFixed(1) + "%" },
        ShareWomen:        { label: "% Women",           format: d => (d * 100).toFixed(1) + "%" },
        Total:             { label: "Total Graduates",   format: d => d.toLocaleString() }
    };

    const sortMetrics = Object.keys(metricConfig);
    let currentSortIndex = 0;
    let sortMetric = sortMetrics[0];

    // Color encodes major category consistently across all filter states
    const colorScale = d3.scaleOrdinal(d3.schemeTableau10);

    let data = [];
    let filteredData = [];

    // Load and parse CSV — coerce numeric fields from strings
    d3.csv("https://raw.githubusercontent.com/fivethirtyeight/data/master/college-majors/recent-grads.csv")
        .then(rawData => {
            data = rawData.map(d => ({
                ...d,
                Median:            +d.Median,
                Unemployment_rate: +d.Unemployment_rate,
                ShareWomen:        +d.ShareWomen,
                Total:             +d.Total,
                Employed:          +d.Employed
            }));

            // Populate category dropdown dynamically from data
            const categories = ["all", ...new Set(data.map(d => d.Major_category))];
            d3.select("#categoryFilter")
                .selectAll("option")
                .data(categories)
                .join("option")
                .attr("value", d => d)
                .text(d => d === "all" ? "All Categories" : d);

            filteredData = data;
            updateVisualization();
        });

    // Interaction 1: category filter — narrows dataset to one academic field
    d3.select("#categoryFilter").on("change", function() {
        filteredData = this.value === "all"
            ? data
            : data.filter(d => d.Major_category === this.value);
        updateVisualization();
    });

    // Interaction 2: sort toggle — cycles through 4 metrics, re-ranks bars
    d3.select("#sortBtn").on("click", function() {
        currentSortIndex = (currentSortIndex + 1) % sortMetrics.length;
        sortMetric = sortMetrics[currentSortIndex];
        this.textContent = metricConfig[sortMetric].label;
        updateVisualization();
    });

    function updateVisualization() {
        // Sort descending by active metric; cap at 30 bars for readability
        const sorted = [...filteredData]
            .sort((a, b) => b[sortMetric] - a[sortMetric])
            .slice(0, 30);

        const cfg = metricConfig[sortMetric];

        // Update summary statistics panel to reflect current filter
        d3.select("#statCount").text(filteredData.length);
        d3.select("#statMedian").text("$" + Math.round(d3.mean(filteredData, d => d.Median)).toLocaleString());
        d3.select("#statUnemployment").text((d3.mean(filteredData, d => d.Unemployment_rate) * 100).toFixed(1) + "%");
        d3.select("#statWomen").text((d3.mean(filteredData, d => d.ShareWomen) * 100).toFixed(1) + "%");

        // x encodes the active sort metric so bar length always matches the ranking
        const x = d3.scaleLinear()
            .domain([0, d3.max(sorted, d => d[sortMetric])])
            .range([0, width]);

        // y is an ordinal band scale — one band per major name
        const y = d3.scaleBand()
            .domain(sorted.map(d => d.Major))
            .range([0, height])
            .padding(0.2);

        // Remove and redraw axes so labels and ticks match the active metric
        svg.selectAll(".axis").remove();

        svg.append("g")
            .attr("class", "axis")
            .attr("transform", `translate(0,${height})`)
            .call(d3.axisBottom(x).ticks(5).tickFormat(cfg.format));

        svg.append("g")
            .attr("class", "axis")
            .call(d3.axisLeft(y));

        // Axis label updates to reflect the currently displayed metric
        svg.append("text")
            .attr("class", "axis")
            .attr("x", width / 2)
            .attr("y", height + 48)
            .attr("text-anchor", "middle")
            .style("font-size", "12px")
            .style("font-weight", "600")
            .text(cfg.label);

        // Bind with major name as key for object-constancy during transitions
        const bars = svg.selectAll(".bar")
            .data(sorted, d => d.Major);

        bars.exit().remove();

        bars.enter()
            .append("rect")
            .attr("class", "bar")
            .attr("x", 0)
            .attr("y", d => y(d.Major))
            .attr("height", y.bandwidth())
            .attr("fill", d => colorScale(d.Major_category))
            .merge(bars)
            .transition().duration(500)
            .attr("y", d => y(d.Major))
            .attr("width", d => x(d[sortMetric]))  // width encodes the active metric
            .attr("fill", d => colorScale(d.Major_category));

        // Interaction 3: tooltip — details-on-demand for all key stats on hover
        svg.selectAll(".bar")
            .on("mouseover", function(event, d) {
                tooltip.style("opacity", 1).html(`
                    <strong>${d.Major}</strong><br/>
                    Category: ${d.Major_category}<br/>
                    Median Salary: $${d.Median.toLocaleString()}<br/>
                    Unemployment: ${(d.Unemployment_rate * 100).toFixed(1)}%<br/>
                    Women: ${(d.ShareWomen * 100).toFixed(1)}%<br/>
                    Total Grads: ${d.Total.toLocaleString()}
                `);
            })
            .on("mousemove", function(event) {
                tooltip
                    .style("left", (event.pageX + 10) + "px")
                    .style("top",  (event.pageY - 10) + "px");
            })
            .on("mouseout", () => tooltip.style("opacity", 0));

        // Rebuild legend to show only categories present in current view
        svg.selectAll(".legend").remove();
        const visibleCategories = [...new Set(sorted.map(d => d.Major_category))];
        const legend = svg.selectAll(".legend")
            .data(visibleCategories)
            .enter()
            .append("g")
            .attr("class", "legend")
            .attr("transform", (d, i) => `translate(${width + 10}, ${i * 20})`);

        legend.append("rect")
            .attr("width", 12).attr("height", 12)
            .attr("fill", d => colorScale(d));

        legend.append("text")
            .attr("x", 18).attr("y", 10)
            .style("font-size", "11px")
            .text(d => d);
    }
</script>
</body>
</html>
